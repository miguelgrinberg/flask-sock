[testenv]
commands=
    pip install -e .
    pytest -p no:logging --cov=flask_sock --cov-branch --cov-report=term-missing --cov-report=xml
deps=
    pytest
    pytest-cov

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/flask_sock tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
